services:
  postgres:
    image: 'postgres:17'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U myuser -d mydatabase" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alertify-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alertify-app
    ports:
      - '8080:8080'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alertify-network
    restart: on-failure

networks:
  alertify-network:
    driver: bridge

volumes:
  postgres-data:
