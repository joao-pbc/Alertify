spring.application.name=Alertify

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=4a6f616f2d6a7774d73656372657416b6579d2d6c6f6e672d656e6f756768
app.jwt.expiration-ms=86400000

# Telegram
app.telegram.bot-token=YOUR_BOT_TOKEN_HERE
app.telegram.api-url=https://api.telegram.org/bot

# News API (external)
app.news-api.base-url=https://newsapi.org/v2
app.news-api.key=YOUR_NEWS_API_KEY_HERE

# Scheduler
app.scheduler.interval-ms=300000

# Async
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
